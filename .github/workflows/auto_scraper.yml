name: Autarker Euro Scraper Cronjob

on:
  schedule:
    - cron: '0 2 * * *' # Läuft jede Nacht um 02:00 Uhr automatisch
  workflow_dispatch: # Aktiviert den manuellen Start-Button unter "Actions"

permissions:
  contents: write # Zwingt GitHub, dem Roboter die Schreibrechte zu geben

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Lädt die gesamte Git-Historie für fehlerfreie Updates

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Bibliotheken installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scraper-Skript ausführen
      run: python scraper.py

    - name: Daten sichern und hochladen
      run: |
        git config --global user.name "Radar-Bot"
        git config --global user.email "radar-bot@users.noreply.github.com"
        git add events.json
        
        # Prüft, ob es überhaupt neue Gigs gibt. Wenn nicht, bricht er nicht ab, sondern ist fertig.
        if ! git diff --cached --quiet; then
          git commit -m "Autarkes Euro-Update von heute"
          git pull origin main --rebase --strategy-option=theirs
          git push origin main
        else
          echo "Keine Änderungen an den Gigs gefunden. Überspringe Upload."
        fi
        
  

