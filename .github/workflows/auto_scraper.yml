name: Autarker Euro Scraper Cronjob

on:
  schedule:
    - cron: '0 2 * * *' # Läuft jede Nacht vollautomatisch um 02:00 Uhr
  workflow_dispatch: # Erlaubt es dir, den Roboter per Knopfdruck manuell zu starten

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - name: Code auschecken
      uses: actions/checkout@v3

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        pip install requests beautifulsoup4

    - name: Scraper ausführen
      run: python scraper.py

    - name: Ergebnisse automatisch speichern
      run: |
        # SO MUSS ES JETZT AUSSEHEN:
git config --global user.name "Radar-Bot"
git add events.json
git commit -m "Autarkes Euro-Update von heute"
git pull origin main --rebase
git push origin main

