name: Autarker Euro Scraper Cronjob

on:
  push:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v4.2.2 # Aktualisiert auf die neueste, Node-24-kompatible Version

    - name: Python einrichten
      uses: actions/setup-python@v5.3.0 # Aktualisiert auf die neueste Version

    - name: Bibliotheken installieren
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Scraper-Skript ausführen
      run: python scraper.py

    - name: Daten sichern und hochladen
      run: |
        git config --global user.name "Radar-Bot"
        git config --global user.email "radar-bot@users.noreply.github.com"
        git add events.json
        if ! git diff --cached --quiet; then
          git commit -m "Autarkes Euro-Update von heute"
          git pull origin main --rebase --strategy-option=theirs
          git push origin main
        else
          echo "Keine Änderungen gefunden."
        fi
        
