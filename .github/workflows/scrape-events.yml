name: Scrape Events Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 lxml
          echo "✅ Dependencies installed"

      - name: Run Scraper
        run: |
          python scraper.py
          echo "✅ Scraper finished"
          echo "📊 events.json size: $(wc -c < events.json) bytes"
          echo "📊 events.json lines: $(wc -l < events.json)"

      - name: Check for Changes
        id: check
        run: |
          git add events.json
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "⚠️ No changes detected in events.json"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected in events.json"
          fi

      - name: Commit and Push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Auto-update events $(date +%Y-%m-%d)"
          git push
          echo "✅ Committed and pushed successfully"
