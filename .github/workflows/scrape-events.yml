name: Scrape Events Daily

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 03:00 UTC
  workflow_dispatch:      # Manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # More time for pagination
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Scraper (with pagination)
        run: python scraper.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push if Changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add events.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-update: $(date +%Y-%m-%d) - $(git log -1 --format=%s | head -c 50)..."
            git push
            echo "✅ events.json updated and pushed"
          else
            echo "ℹ️ No changes to events.json"
          fi
