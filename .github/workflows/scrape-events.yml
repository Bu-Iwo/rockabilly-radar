name: Scrape Events Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run Scraper
        run: |
          python scraper.py
          echo "✅ Scraper finished"
          echo "📊 events.json: $(wc -l < events.json) lines"

      - name: Commit and Push (with conflict resolution)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add events.json
          
          if git diff --cached --quiet; then
            echo "⚠️ No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update events $(date +%Y-%m-%d)"
          
          # Versuche zu pushen - bei Konflikt automatisch lösen
          git push origin main 2>&1 || {
            echo "⚠️ Push failed, resolving conflicts..."
            
            # Hole neueste Änderungen, löse Konflikte automatisch 
            # zugunsten unserer neuen events.json (theirs bei rebase)
            GIT_EDITOR=true git pull --rebase origin main -X theirs
            
            git push origin main
          }
          
          echo "✅ Successfully pushed"
