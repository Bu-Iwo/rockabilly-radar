name: Scrape Events Daily

on:
  schedule:
    - cron: '0 6 * * *'  # Jeden Tag um 6:00 Uhr UTC
  workflow_dispatch:  # Manueller Start möglich

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml playwright
          playwright install chromium
          playwright install-deps chromium
      
      - name: Run scraper
        run: python scraper.py
        timeout-minutes: 10
      
      - name: Check if events.json changed
        id: check_changes
        run: |
          if git diff --quiet events.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push events.json
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add events.json
          git commit -m "🎸 Update events.json - $(date +'%Y-%m-%d %H:%M')"
          git push
