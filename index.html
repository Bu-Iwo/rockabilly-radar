<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockabilly Radar</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent: #e67e22;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 110px;
        }
        header {
            text-align: center;
            border-bottom: 3px double var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--accent); font-size: 2.2rem; text-transform: uppercase; }
        .status-badge {
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }
        .filter-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #bdc3c7; }
        .input-field {
            width: 100%; padding: 10px; background: #111; border: 1px solid var(--accent);
            color: white; border-radius: 4px; box-sizing: border-box; font-size: 1rem;
        }
        .btn-search {
            background: var(--accent); color: white; border: none; padding: 8px 15px;
            border-radius: 4px; cursor: pointer; margin-top: 8px; width: 100%; font-weight: bold;
        }
        .event-card {
            background: var(--card-bg); border-left: 5px solid var(--accent); padding: 15px;
            margin-bottom: 15px; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative;
        }
        .event-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 5px; color: var(--accent); padding-right: 70px; }
        .event-date { color: #bdc3c7; font-weight: bold; }
        .event-loc { color: #95a5a6; font-size: 0.9rem; margin-top: 3px; }
        
        /* Neues Design für Ausklapp-Menü & Buttons */
        details.event-details-toggle {
            margin-top: 12px;
            background: #222;
            border-radius: 6px;
            padding: 10px;
            border: 1px solid #444;
        }
        summary {
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: bold;
            outline: none;
            list-style: none; /* Entfernt Standard-Pfeil in einigen Browsern */
        }
        summary::-webkit-details-marker { display: none; }
        summary::before { content: '➕ '; }
        details[open] summary::before { content: '➖ '; }
        
        .event-desc { margin-top: 10px; font-size: 0.95rem; line-height: 1.4; color: #eee; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .btn-link, .btn-cal, .btn-booking {
            display: inline-block; color: white; text-decoration: none; padding: 8px 10px;
            border-radius: 4px; font-size: 0.85rem; font-weight: bold; flex: 1 1 auto; text-align: center;
        }
        .btn-link { background: #34495e; border: 1px solid var(--accent); }
        .btn-cal { background: #4285F4; border: 1px solid #2a5eb5; } /* Google Blau */
        .btn-booking { background: #003580; border: 1px solid #002255; } /* Booking.com Blau */

        .distance-badge {
            position: absolute; top: 15px; right: 15px; background: #34495e;
            color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.8rem;
        }
        
        /* Radio Player Leiste unten */
        .radio-player {
            position: fixed; bottom: 0; left: 0; right: 0; background: #111;
            border-top: 3px solid var(--accent); padding: 15px; display: flex;
            align-items: center; justify-content: space-between; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 1000;
        }
        .radio-info { display: flex; flex-direction: column; }
        .radio-title { font-weight: bold; color: white; }
        .radio-status { font-size: 0.8rem; color: #aaa; }
        .play-btn { background: var(--accent); border: none; color: white; padding: 10px 22px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>🎸 Rockabilly Radar ⚡</h1>
        <div class="status-badge">Radar: Aktivisiert</div>
    </header>

    <div class="filter-section">
        <div class="input-group">
            <label for="city-input">📍 Mein Standort (Stadt):</label>
            <input type="text" id="city-input" class="input-field" value="Zwickau" placeholder="z.B. Zwickau">
            <button class="btn-search" onclick="updateLocationCoords()">Entfernung berechnen</button>
        </div>
        
        <div class="input-group" style="margin-top: 15px;">
            <label for="radius">🔍 Maximaler Umkreis: <span id="radius-val">2500 km</span></label>
            <input type="range" id="radius" min="10" max="2500" value="2500" style="width:100%;" oninput="filterAndRender()">
        </div>
    </div>

    <div id="events-container">Lade Rock'n'Roll Termine aus der Datenbank...</div>

    <!-- RADIO INTERFACE -->
    <div class="radio-player">
        <div class="radio-info">
            <span class="radio-title">📻 Rockabilly Jukebox</span>
            <span id="radio-status" class="radio-status">Bereit zum Abspielen</span>
        </div>
        <button id="play-button" class="play-btn" onclick="toggleRadio()">PLAY</button>
    </div>

    <audio id="audio-stream" src="https://stream.rockantenne.de/rockantenne/stream/mp3"></audio>

    <script>
        let allEvents = [];
        let userLat = 50.7189;
        let userLon = 12.4961;

        const audio = document.getElementById('audio-stream');
        const playBtn = document.getElementById('play-button');
        const radioStatus = document.getElementById('radio-status');

        async function loadEvents() {
            try {
                const response = await fetch('events.json?v=' + new Date().getTime());
                const data = await response.json();
                
                if (Array.isArray(data)) {
                    allEvents = data;
                } else if (typeof data === 'object' && data !== null) {
                    allEvents = data.events || Object.values(data)[0] || [];
                } else {
                    allEvents = [];
                }
                filterAndRender();
            } catch (e) {
                document.getElementById('events-container').innerHTML = "Daten werden im Hintergrund generiert. Bitte lade die Seite in einer Minute neu! ⚡";
            }
        }

        async function updateLocationCoords() {
            const city = document.getElementById('city-input').value.trim();
            if(!city) return;
            document.getElementById('events-container').innerHTML = "Berechne Entfernungen für " + city + "...";
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
                const data = await response.json();
                if(data && data.length > 0) {
                    userLat = parseFloat(data[0].lat);
                    userLon = parseFloat(data[0].lon);
                }
            } catch(e) { console.log("Fehler bei der Ortssuche."); }
            filterAndRender();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            if (!lat1 || !lon1 || !lat2 || !lon2) return null;
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return Math.round(R * c);
        }

        function filterAndRender() {
            const radiusVal = parseInt(document.getElementById('radius').value);
            document.getElementById('radius-val').innerText = radiusVal + " km";

            let processed = allEvents.map(ev => {
                const dist = calculateDistance(userLat, userLon, ev.lat, ev.lon);
                return { ...ev, distance: dist };
            });

            let filtered = processed.filter(ev => {
                if (ev.distance === null) return true; 
                return ev.distance <= radiusVal;
            });

            filtered.sort((a, b) => {
                if (a.distance === null) return 1;
                if (b.distance === null) return -1;
                return a.distance - b.distance;
            });

            renderContainer(filtered);
        }

        function renderContainer(events) {
            const container = document.getElementById('events-container');
            if (!events || events.length === 0) {
                container.innerHTML = "Aktuell keine Gigs im ausgewählten Umkreis gefunden.";
                return;
            }

            container.innerHTML = events.map(ev => {
                // Link-Generatoren für Google Kalender & Booking.com
                const title = encodeURIComponent(ev.title || 'Rockabilly Event');
                const details = encodeURIComponent(ev.desc || 'Weitere Infos siehe Webseite.');
                const locName = ev.city || ev.location || 'Deutschland';
                const loc = encodeURIComponent(locName);
                // Fallback Datum für den Kalender (Format: YYYYMMDDThhmmssZ)
                const dates = ev.gCalDates || '20260601T180000Z/20260601T230000Z'; 
                
                const gCalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dates}&details=${details}&location=${loc}`;
                const bookingUrl = `https://www.booking.com/searchresults.html?ss=${loc}`;

                return `
                <div class="event-card">
                    ${ev.distance !== null ? `<div class="distance-badge">📍 ${ev.distance} km</div>` : ''}
                    <div class="event-date">${ev.date || 'Termin folgt'}</div>
                    <div class="event-title">${ev.title || 'Rock\'n\'Roll Event'}</div>
                    <div class="event-loc">Ort: ${ev.location || ev.city || 'Veranstaltungsort'}</div>
                    
                    <details class="event-details-toggle">
                        <summary>Weitere Infos & Aktionen</summary>
                        <div class="event-desc">${ev.desc || 'Live Musik, Tanz und coole Karren.'}</div>
                        
                        <div class="action-buttons">
                            ${ev.url ? `<a href="${ev.url}" target="_blank" class="btn-link">🌍 Website</a>` : ''}
                            <a href="${gCalUrl}" target="_blank" class="btn-cal">📅 Google Kalender</a>
                            <a href="${bookingUrl}" target="_blank" class="btn-booking">🛏️ Unterkünfte (Booking)</a>
                        </div>
                    </details>
                </div>
                `;
            }).join('');
        }

        function toggleRadio() {
            if (audio.paused) {
                radioStatus.innerText = "Verbinde Jukebox...";
                audio.play().then(() => {
                    playBtn.innerText = "STOP";
                    playBtn.style.background = "#27ae60";
                    radioStatus.innerText = "Pure Rock'n'Roll (LIVE)";
                }).catch(err => {
                    radioStatus.innerText = "Stream temporär überlastet.";
                });
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
                playBtn.style.background = "var(--accent)";
                radioStatus.innerText = "Jukebox pausiert";
            }
        }

        loadEvents();
    </script>
</body>
</html>
