<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockabilly Radar ⚡</title>
    
    <!-- PWA META TAGS -->
    <meta name="theme-color" content="#ff4500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RockRadar">
    <link rel="manifest" href="manifest.json">
    
    <!-- Leaflet CSS für die Karte -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #ff4500;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 60px; /* Platz für Radio Player */
        }
        header {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        h1 { margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid var(--accent);
            z-index: 1;
        }

        .controls {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            background: #333;
            border: 1px solid var(--accent);
            color: white;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .event-list {
            max-height: 800px;
            overflow-y: auto;
        }
        .event-card {
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .event-card:hover { transform: translateX(5px); }
        .event-title { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .event-date { color: #aaa; font-size: 0.9rem; margin-bottom: 5px; }
        .event-loc { font-size: 0.9rem; color: #ccc; }
        .distance-badge {
            float: right;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        .btn-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid var(--accent);
            padding: 5px 10px;
            border-radius: 4px;
        }
        .btn-link:hover { background: var(--accent); color: white; }

        .radio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            border-top: 2px solid var(--accent);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        /* Install Banner */
        .install-banner {
            display: none;
            background: var(--accent);
            color: white;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<!-- Install Banner (erscheint nur wenn installierbar) -->
<div class="install-banner" id="installBanner">
    📱 App installieren? Hier tippen!
</div>

<header>
    <h1>🎸 Rockabilly Radar ⚡</h1>
    <p style="margin:5px 0 0 0; font-size:0.9rem; color:#aaa;">Finde die heißesten Gigs in Europa</p>
</header>

<div class="container">
    <div>
        <div id="map"></div>
        <div class="controls">
            <label>📍 Dein Standort:</label><br>
            <input type="text" id="city-input" value="Zwickau" placeholder="Stadt eingeben">
            <button onclick="updateLocation()">Aktualisieren</button>
        </div>
    </div>

    <div class="event-list" id="events-container">
        <p>Lade Termine...</p>
    </div>
</div>

<div class="radio-player">
    <div>
        <strong>📻 Rockabilly Jukebox</strong>
        <span id="radio-status" style="font-size:0.8rem; color:#aaa; margin-left:10px;">Bereit</span>
    </div>
    <button onclick="toggleRadio()" id="play-btn">PLAY</button>
</div>
<audio id="audio-stream" src="https://stream.rockantenne.de/rockantenne/stream/mp3"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let allEvents = [];
    let userLat = 50.7189;
    let userLon = 12.4961;
    let map, markersLayer;

    // PWA Installation
    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';
    });

    installBanner.addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
                installBanner.style.display = 'none';
            });
        }
    });

    // Service Worker registrieren
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registriert'))
            .catch(err => console.log('Service Worker Fehler', err));
    }

    function initMap() {
        map = L.map('map').setView([userLat, userLon], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
    }

    async function loadEvents() {
        try {
            const response = await fetch('events.json?v=' + new Date().getTime());
            const data = await response.json();
            allEvents = Array.isArray(data) ? data : [];
            updateDisplay();
        } catch (e) {
            document.getElementById('events-container').innerHTML = "Fehler beim Laden der Daten.";
        }
    }

    async function updateLocation() {
        const city = document.getElementById('city-input').value.trim();
        if (!city) return;
        
        document.getElementById('events-container').innerHTML = "Suche Koordinaten...";
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
            const data = await res.json();
            if (data && data.length > 0) {
                userLat = parseFloat(data[0].lat);
                userLon = parseFloat(data[0].lon);
                map.setView([userLat, userLon], 8);
                updateDisplay();
            }
        } catch (e) { console.error(e); }
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        if (!lat1 || !lat2) return null;
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function updateDisplay() {
        const container = document.getElementById('events-container');
        markersLayer.clearLayers();
        
        let processed = allEvents.map(ev => {
            const dist = calculateDistance(userLat, userLon, ev.lat, ev.lon);
            return { ...ev, distance: dist };
        });

        processed.sort((a, b) => {
            if (a.distance === null) return 1;
            if (b.distance === null) return -1;
            return a.distance - b.distance;
        });

        container.innerHTML = processed.map(ev => {
            if (ev.lat && ev.lon) {
                const marker = L.marker([ev.lat, ev.lon]).bindPopup(`<b>${ev.title}</b><br>${ev.date}`);
                markersLayer.addLayer(marker);
            }

            const distText = ev.distance !== null ? `<span class="distance-badge">📍 ${ev.distance} km</span>` : '';
            
            return `
            <div class="event-card">
                ${distText}
                <div class="event-title">${ev.title}</div>
                <div class="event-date">📅 ${ev.date || 'Termin unbekannt'}</div>
                <div class="event-loc">🏠 ${ev.location || ev.city}</div>
                ${ev.url ? `<a href="${ev.url}" target="_blank" class="btn-link">Mehr Infos</a>` : ''}
            </div>
            `;
        }).join('');
    }

    function toggleRadio() {
        const audio = document.getElementById('audio-stream');
        const btn = document.getElementById('play-btn');
        const status = document.getElementById('radio-status');
        
        if (audio.paused) {
            audio.play();
            btn.innerText = "STOP";
            status.innerText = "Läuft...";
        } else {
            audio.pause();
            btn.innerText = "PLAY";
            status.innerText = "Pausiert";
        }
    }

    initMap();
    loadEvents();
</script>

</body>
</html>
