<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockabilly Radar</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --accent: #e67e22;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            padding-bottom: 100px;
        }
        header {
            text-align: center;
            border-bottom: 3px double var(--accent);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; color: var(--accent); font-size: 2.5rem; text-transform: uppercase; }
        .status-badge {
            background: #27ae60;
            color: white;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 5px;
        }
        .filter-section {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }
        .event-card {
            background: var(--card-bg);
            border-left: 5px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .event-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; color: var(--accent); }
        .event-date { color: #bdc3c7; font-weight: bold; }
        .event-loc { color: #95a5a6; font-size: 0.9rem; }
        .event-desc { margin-top: 8px; font-size: 0.95rem; line-height: 1.4; }
        .btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        /* Radio Player Leiste unten */
        .radio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #111;
            border-top: 3px solid var(--accent);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .radio-info { display: flex; flex-direction: column; }
        .radio-title { font-weight: bold; color: white; }
        .radio-status { font-size: 0.8rem; color: #aaa; }
        .play-btn {
            background: var(--accent);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎸 Rockabilly Radar ⚡</h1>
        <div class="status-badge">Daten: Live-Server</div>
    </header>

    <div class="filter-section">
        <label for="radius">🔍 Umkreis-Filter: </label>
        <input type="range" id="radius" min="10" max="2500" value="2500" oninput="updateRadius(this.value)">
        <span id="radius-val">2500 km</span>
    </div>

    <div id="events-container">Lade feinste Rock'n'Roll Termine...</div>

    <div class="radio-player">
        <div class="radio-info">
            <span class="radio-title">📻 Rockabilly Jukebox</span>
            <span id="radio-status" class="radio-status">Bereit zum Abspielen</span>
        </div>
        <button id="play-button" class="play-btn" onclick="toggleRadio()">PLAY</button>
    </div>

    <audio id="audio-stream" src="https://stream.rockantenne.de/rockantenne/stream/mp3"></audio>

    <script>
        let allEvents = [];
        const streamUrl = "https://stream.rockantenne.de/rockantenne/stream/mp3"; // Stabiler Rock-Stream als Basis
        const audio = document.getElementById('audio-stream');
        const playBtn = document.getElementById('play-button');
        const radioStatus = document.getElementById('radio-status');

        // Gigs vom Server laden
        async function loadEvents() {
            try {
                const response = await fetch('events.json?v=' + new Date().getTime());
                allEvents = await response.parse ? await response.json() : Object.values(await response.json())[0] || [];
                if(!Array.isArray(allEvents)) allEvents = Object.values(allEvents);
                renderEvents(allEvents);
            } catch (e) {
                // Fallback falls Datei noch generiert wird
                document.getElementById('events-container').innerHTML = "Fehler beim Laden oder Server generiert Daten neu. Bitte gleich nochmal aktualisieren!";
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('events-container');
            if (!events || events.length === 0) {
                container.innerHTML = "Aktuell keine Gigs im Umkreis gefunden.";
                return;
            }
            container.innerHTML = events.map(ev => `
                <div class="event-card">
                    <div class="event-date">${ev.date || 'Termin folgt'}</div>
                    <div class="event-title">${ev.title}</div>
                    <div class="event-loc">📍 ${ev.location || ev.city || 'Veranstaltungsort'}</div>
                    <div class="event-desc">${ev.desc || 'Live Rock\'n\'Roll Event! Mehr Infos auf der Website.'}</div>
                    ${ev.url ? `<a href="${ev.url}" target="_blank" class="btn">Website</a>` : ''}
                </div>
            `).join('');
        }

        function updateRadius(val) {
            document.getElementById('radius-val').innerText = val + " km";
            // Da wir im vereinfachten Modus sind, zeigt er bei hohem Radius alle an
            if(val > 1000) renderEvents(allEvents);
        }

        // Radio Steuerung
        function toggleRadio() {
            if (audio.paused) {
                radioStatus.innerText = "Verbinde Stream...";
                audio.play().then(() => {
                    playBtn.innerText = "STOP";
                    playBtn.style.background = "#27ae60";
                    radioStatus.innerText = "Pure Rock'n'Roll (LIVE)";
                }).catch(err => {
                    radioStatus.innerText = "Fehler beim Laden des Streams.";
                });
            } else {
                audio.pause();
                playBtn.innerText = "PLAY";
                playBtn.style.background = "var(--accent)";
                radioStatus.innerText = "Abhängen gestoppt";
            }
        }

        // Start
        loadEvents();
    </script>
</body>
</html>
