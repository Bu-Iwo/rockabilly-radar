<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rockabilly Radar ⚡</title>
    <meta name="theme-color" content="#C41E3A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RockRadar">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lobster&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root { --cream: #FFF8DC; --red: #C41E3A; --silver: #C0C0C0; --brown: #3E2723; --bg: #F5E6D3; --green: #7FB069; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Oswald', sans-serif; background: var(--bg); color: var(--brown); padding-bottom: 140px; }
        
        header { background: linear-gradient(135deg, var(--red), #8B0000); padding: 15px; text-align: center; border-bottom: 4px solid var(--silver); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Lobster', cursive; font-size: 2rem; color: var(--cream); text-shadow: 2px 2px 0 var(--brown); }
        .tagline { font-family: 'Bebas Neue'; color: var(--silver); letter-spacing: 3px; font-size: 0.9rem; }

        main { padding: 20px; max-width: 800px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, var(--red), #8B0000); border-top: 3px solid var(--silver); display: flex; justify-content: space-around; padding: 8px 0; z-index: 2000; }
        .nav-btn { flex: 1; background: none; border: none; color: var(--cream); cursor: pointer; font-family: 'Bebas Neue'; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 2px; opacity: 0.7; }
        .nav-btn.active { opacity: 1; transform: translateY(-2px); }
        .nav-icon { font-size: 1.4rem; }

        #map-container { height: calc(100vh - 180px); min-height: 300px; border-radius: 15px; border: 3px solid var(--silver); overflow: hidden; }
        #map { height: 100%; width: 100%; }

        .filter-section { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; border: 2px solid var(--silver); }
        .filter-title { font-family: 'Bebas Neue'; font-size: 1.2rem; color: var(--red); margin-bottom: 8px; border-bottom: 1px solid var(--silver); padding-bottom: 5px; }
        input[type="text"] { width: 100%; padding: 10px; background: var(--cream); border: 2px solid var(--silver); border-radius: 8px; font-family: 'Oswald'; margin-bottom: 10px; }
        button.action-btn { padding: 8px 15px; background: var(--red); color: white; border: 2px solid var(--brown); border-radius: 8px; font-family: 'Bebas Neue'; cursor: pointer; margin-right: 5px; }
        
        .genre-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
        .pill { padding: 5px 12px; background: var(--cream); border: 2px solid var(--silver); border-radius: 20px; font-family: 'Bebas Neue'; cursor: pointer; font-size: 0.85rem; }
        .pill.active { background: var(--red); color: white; border-color: var(--red); }

        .event-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 2px solid var(--silver); position: relative; }
        .event-title { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--red); }
        .event-date { color: var(--brown); margin: 4px 0; }
        .event-loc { font-size: 0.9rem; color: #666; }
        .distance-badge { display: inline-block; background: var(--green); color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: bold; margin-top: 5px; }
        
        .event-details { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--silver); }
        .event-details.active { display: block; }
        .btn-link { display: inline-block; padding: 6px 12px; background: var(--red); color: white; text-decoration: none; border-radius: 6px; font-size: 0.8rem; margin: 4px 4px 0 0; font-family: 'Bebas Neue'; letter-spacing: 1px; }

        .radio-container { background: white; border-radius: 15px; padding: 30px; border: 3px solid var(--silver); text-align: center; margin-top: 20px; }
        .play-button { width: 80px; height: 80px; border-radius: 50%; background: var(--red); border: 4px solid var(--silver); color: white; font-size: 2rem; cursor: pointer; margin: 15px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s; }
        .play-button:hover { transform: scale(1.1); }
        .play-button:active { transform: scale(0.95); }
        
        footer { text-align: center; padding: 20px; margin-top: 30px; border-top: 3px solid var(--silver); background: var(--brown); color: var(--cream); margin-bottom: 60px; }
        footer a { color: var(--cream); margin: 0 10px; text-decoration: none; font-family: 'Bebas Neue'; letter-spacing: 1px; }
        footer a:hover { color: var(--red); }
    </style>
</head>
<body>

<header>
    <h1 class="logo">🎸 Rockabilly Radar ⚡</h1>
    <p class="tagline">FIND YOUR NEXT GIG</p>
</header>

<main>
    <div id="tab-map" class="tab-content active">
        <div id="map-container"><div id="map"></div></div>
    </div>

    <div id="tab-events" class="tab-content">
        <div class="filter-section">
            <div class="filter-title">📍 Standort</div>
            <input type="text" id="city-input" placeholder="Stadt eingeben...">
            <button class="action-btn" onclick="updateLocation()">Suchen</button>
            <button class="action-btn" onclick="getGPS()">📡 GPS</button>
            
            <div class="filter-title" style="margin-top:15px">📏 Radius: <span id="radius-val">2500 km</span></div>
            <input type="range" id="radius-slider" min="10" max="2500" value="2500" style="width:100%" oninput="document.getElementById('radius-val').innerText=this.value+' km'; updateDisplay()">
            
            <div class="filter-title" style="margin-top:15px">🎶 Genre</div>
            <div class="genre-pills" id="genre-filter">
                <span class="pill active" onclick="setGenre('all', this)">Alle</span>
                <span class="pill" onclick="setGenre('Rockabilly', this)">Rockabilly</span>
                <span class="pill" onclick="setGenre('Rock\'n\'Roll', this)">Rock'n'Roll</span>
                <span class="pill" onclick="setGenre('Lindy Hop', this)">Lindy Hop</span>
                <span class="pill" onclick="setGenre('Psychobilly', this)">Psychobilly</span>
            </div>
            <div id="status" style="margin-top:10px; font-size:0.9rem; color:#666;">Lade...</div>
        </div>
        <div id="events-list"></div>
    </div>

    <div id="tab-search" class="tab-content">
        <div class="filter-section">
            <div class="filter-title">🔍 Suche</div>
            <input type="text" id="search-input" placeholder="Band, Ort, Event..." oninput="doSearch()">
            <div id="search-results"></div>
        </div>
    </div>

    <div id="tab-radio" class="tab-content">
        <div class="radio-container">
            <h2 style="font-family:'Lobster'; color:var(--red); font-size:2rem;">📻 Rockabilly Radio</h2>
            <p style="font-family:'Bebas Neue'; letter-spacing:2px; color:#666; margin-bottom:20px;">24/7 ROCK'N'ROLL STREAM</p>
            <button class="play-button" onclick="toggleRadio()" id="play-btn">▶</button>
            <div id="radio-status" style="font-family:'Bebas Neue'; color:var(--green); letter-spacing:2px; margin-top:15px;">BEREIT</div>
            <!-- NEUER, FUNKTIONIERTENDER STREAM -->
            <audio id="audio" preload="none" src="https://stream.rockantenne.de/rockabilly/stream/mp3">
                Dein Browser unterstützt kein Audio.
            </audio>
        </div>
    </div>
</main>

<footer>
    <a href="impressum.html">IMPRESSUM</a>
    <a href="datenschutz.html">DATENSCHUTZ</a>
    <a href="https://github.com/Bu-Iwo/rockabilly-radar" target="_blank">GITHUB</a>
    <p style="margin-top:10px; font-size:0.8rem; opacity:0.7;">© 2026 Rockabilly Radar</p>
</footer>

<nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('map', this)"><span class="nav-icon">🗺️</span>Karte</button>
    <button class="nav-btn" onclick="switchTab('events', this)"><span class="nav-icon">📅</span>Events</button>
    <button class="nav-btn" onclick="switchTab('search', this)"><span class="nav-icon">🔍</span>Suche</button>
    <button class="nav-btn" onclick="switchTab('radio', this)"><span class="nav-icon">📻</span>Radio</button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let events = [], userLat = 50.7189, userLon = 12.4961, radius = 2500, genre = 'all';
let map, markers, userMarker;

window.onload = () => {
    initMap();
    loadEvents();
};

function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    btn.classList.add('active');
}

function initMap() {
    map = L.map('map').setView([userLat, userLon], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    markers = L.layerGroup().addTo(map);
    userMarker = L.circleMarker([userLat, userLon], {color:'#7FB069', fillColor:'#7FB069', fillOpacity:1, radius:8}).addTo(map).bindPopup('📍 Du bist hier');
}

function getGPS() {
    if (!navigator.geolocation) return setStatus('❌ GPS nicht unterstützt');
    setStatus('📡 Suche...');
    navigator.geolocation.getCurrentPosition(p => {
        userLat = p.coords.latitude; userLon = p.coords.longitude;
        map.setView([userLat, userLon], 8);
        userMarker.setLatLng([userLat, userLon]);
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLon}`)
            .then(r=>r.json()).then(d => {
                document.getElementById('city-input').value = d.address.city || d.address.town || '';
                setStatus('✅ GPS gefunden'); updateDisplay();
            }).catch(() => { setStatus('✅ GPS gefunden'); updateDisplay(); });
    }, () => setStatus('❌ GPS Fehler'));
}

async function updateLocation() {
    const city = document.getElementById('city-input').value.trim();
    if (!city) return;
    setStatus('🔍 Suche...');
    try {
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)}&limit=1`);
        const d = await r.json();
        if (d.length) {
            userLat = parseFloat(d[0].lat); userLon = parseFloat(d[0].lon);
            map.setView([userLat, userLon], 8); userMarker.setLatLng([userLat, userLon]);
            setStatus(`✅ ${city}`); updateDisplay();
        } else setStatus('❌ Nicht gefunden');
    } catch(e) { setStatus('❌ Fehler'); }
}

async function loadEvents() {
    try {
        const r = await fetch('events.json?t=' + Date.now());
        if (!r.ok) throw new Error();
        events = await r.json();
        if (!Array.isArray(events)) events = [];
    } catch(e) {
        events = [
            {title:"Summer Jamboree 2026", date:"01.08. - 09.08.2026", city:"Senigallia", lat:43.7147, lon:13.2183, desc:"Europas größtes Rockabilly-Festival", url:"https://www.summerjamboree.com", genres:["Rockabilly"]},
            {title:"Firebirds Festival 2026", date:"03.07.2026", city:"Grimma", lat:51.2294, lon:12.7561, desc:"Rock'n'Roll im Kloster", url:"https://www.firebirds-festival.de", genres:["Rock'n'Roll"]},
            {title:"High Rockabilly 2026", date:"15.05.2026", city:"Irun", lat:43.3396, lon:-1.7894, desc:"Top Rockabilly Festival Spanien", url:"https://www.highrockabilly.com", genres:["Rockabilly"]},
            {title:"Viva Las Vegas 2026", date:"16.04.2026", city:"Las Vegas", lat:36.1699, lon:-115.1398, desc:"Weltgrößtes Rockabilly Festival", url:"https://www.vivalasvegas.net", genres:["Rockabilly","50er"]}
        ];
        setStatus(`⚠️ Offline-Modus (${events.length} Events)`);
    }
    setStatus(`✅ ${events.length} Events geladen`);
    updateDisplay();
}

function setGenre(g, el) {
    genre = g;
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    updateDisplay();
}

// NEUE FUNKTION: Generiert Google Calendar Link aus dem Datum
function getGoogleCalendarUrl(ev) {
    if (!ev.date) return null;
    
    let startDate = null, endDate = null;
    let regex = /(\d{2})\.(\d{2})\.(\d{4})/g;
    let dateMatches = [];
    let match;
    
    // Finde alle vollständigen Daten (DD.MM.YYYY)
    while ((match = regex.exec(ev.date)) !== null) {
        dateMatches.push(match.slice(1));
    }
    
    if (dateMatches.length >= 2) {
        // Zeitraum mit zwei vollständigen Daten
        let [d1, m1, y1] = dateMatches[0];
        let [d2, m2, y2] = dateMatches[1];
        startDate = new Date(Date.UTC(parseInt(y1), parseInt(m1) - 1, parseInt(d1)));
        endDate = new Date(Date.UTC(parseInt(y2), parseInt(m2) - 1, parseInt(d2)));
        endDate.setUTCDate(endDate.getUTCDate() + 1); // Google Calendar Enddatum ist exklusiv
    } else {
        // Prüfe auf Format DD.MM. - DD.MM.YYYY
        let matchPartial = ev.date.match(/(\d{2})\.(\d{2})\.\s*-\s*(\d{2})\.(\d{2})\.(\d{4})/);
        if (matchPartial) {
            let [_, d1, m1, d2, m2, y] = matchPartial;
            let y1 = parseInt(y);
            // Wenn Startmonat > Endmonat, dann Jahreswechsel (z.B. 29.12. - 05.01.)
            if (parseInt(m1) > parseInt(m2)) {
                y1--;
            }
            startDate = new Date(Date.UTC(y1, parseInt(m1) - 1, parseInt(d1)));
            endDate = new Date(Date.UTC(parseInt(y), parseInt(m2) - 1, parseInt(d2)));
            endDate.setUTCDate(endDate.getUTCDate() + 1);
        } else if (dateMatches.length === 1) {
            // Einzelnes Datum
            let [d, m, y] = dateMatches[0];
            startDate = new Date(Date.UTC(parseInt(y), parseInt(m) - 1, parseInt(d)));
            endDate = new Date(startDate);
            endDate.setUTCDate(endDate.getUTCDate() + 1);
        }
    }
    
    if (!startDate || !endDate) return null;
    
    function formatDate(date) {
        return date.toISOString().slice(0, 10).replace(/-/g, '');
    }
    
    let datesParam = `${formatDate(startDate)}/${formatDate(endDate)}`;
    let title = encodeURIComponent(ev.title || 'Event');
    let details = encodeURIComponent(ev.desc || '');
    let location = encodeURIComponent(ev.location || ev.city || '');
    
    return `https://www.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${datesParam}&details=${details}&location=${location}&sf=true&output=xml`;
}

function updateDisplay() {
    radius = parseInt(document.getElementById('radius-slider').value);
    const list = document.getElementById('events-list');
    markers.clearLayers();
    
    let filtered = events.map(ev => {
        const dist = getDist(userLat, userLon, ev.lat, ev.lon);
        return {...ev, dist};
    }).filter(ev => {
        const inRadius = ev.dist === null || ev.dist <= radius;
        const matchGenre = genre === 'all' || (ev.genres && ev.genres.includes(genre));
        return inRadius && matchGenre;
    }).sort((a,b) => (a.dist||9999) - (b.dist||9999));

    if (!filtered.length) { list.innerHTML = '<p style="text-align:center;color:#999;padding:20px">Keine Events gefunden</p>'; return; }

    list.innerHTML = filtered.map((ev, i) => {
        if (ev.lat && ev.lon) L.marker([ev.lat, ev.lon]).addTo(markers).bindPopup(`<b>${ev.title}</b><br>${ev.date||''}`);
        const distTxt = ev.dist !== null ? `<span class="distance-badge">📍 ${ev.dist} km</span>` : '';
        const tags = (ev.genres||[]).map(g => `<span style="font-size:0.7rem;background:#eee;padding:1px 6px;border-radius:4px">${g}</span>`).join(' ');
        
        // Kalender-Button hinzufügen
        const calUrl = getGoogleCalendarUrl(ev);
        const calBtn = calUrl ? `<a href="${calUrl}" target="_blank" class="btn-link">📅 Kalender</a>` : '';
        
        return `<div class="event-card">
            <div class="event-title">${ev.title}</div>
            <div style="margin:4px 0">${tags}</div>
            <div class="event-date">📅 ${ev.date||'TBA'}</div>
            <div class="event-loc">🏠 ${ev.city||''}</div>
            ${distTxt}
            <button class="action-btn" style="margin-top:8px;font-size:0.8rem" onclick="this.nextElementSibling.classList.toggle('active')">ℹ️ Infos</button>
            <div class="event-details">
                <p style="font-size:0.9rem;color:#555;margin-bottom:8px">${ev.desc||''}</p>
                ${ev.url ? `<a href="${ev.url}" target="_blank" class="btn-link">🔗 Webseite</a>` : ''}
                ${calBtn}
                <a href="https://www.booking.com/searchresults.de.html?ss=${encodeURIComponent(ev.city||'')}" target="_blank" class="btn-link">🏨 Hotel</a>
            </div>
        </div>`;
    }).join('');
    
    setStatus(`✅ ${filtered.length} Events im Radius`);
}

function doSearch() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const res = document.getElementById('search-results');
    if (!q) { res.innerHTML = ''; return; }
    const found = events.filter(e => `${e.title} ${e.city} ${e.desc}`.toLowerCase().includes(q));
    res.innerHTML = found.length 
        ? found.map(e => `<div class="event-card" style="padding:10px"><div class="event-title" style="font-size:1.1rem">${e.title}</div><div class="event-date">${e.date||''} • ${e.city||''}</div></div>`).join('')
        : '<p style="color:#999;padding:10px">Nichts gefunden</p>';
}

// VERBESSERTES RADIO MIT NEUEM STREAM
function toggleRadio() {
    const audio = document.getElementById('audio');
    const btn = document.getElementById('play-btn');
    const status = document.getElementById('radio-status');
    
    if (audio.paused) {
        status.textContent = '⏳ Lade...';
        btn.disabled = true;
        
        const playPromise = audio.play();
        
        if (playPromise !== undefined) {
            playPromise.then(() => {
                btn.textContent = '⏸';
                status.textContent = '🎵 LÄUFT';
                btn.disabled = false;
            }).catch(error => {
                console.error('Audio Fehler:', error);
                status.textContent = '❌ Stream nicht verfügbar';
                btn.textContent = '▶';
                btn.disabled = false;
                
                // Fallback: Versuche alten Stream, falls der neue ausfällt
                if (audio.src.includes('rockantenne')) {
                    audio.src = 'https://rockabillyradio.ice.infomaniak.ch/rockabillyradio-128.mp3';
                    status.textContent = '⚠️ Wechsle Stream...';
                    setTimeout(() => {
                        audio.play().then(() => {
                            btn.textContent = '⏸';
                            status.textContent = '🎵 LÄUFT';
                        }).catch(() => {
                            status.textContent = '❌ Kein Stream verfügbar';
                        });
                    }, 1000);
                }
            });
        }
    } else {
        audio.pause();
        btn.textContent = '▶';
        status.textContent = 'PAUSIERT';
    }
}

function getDist(lat1,lon1,lat2,lon2) {
    if (!lat1||!lat2) return null;
    const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
</script>
</body>
</html>
