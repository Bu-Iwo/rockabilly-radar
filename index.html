<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Rockabilly Radar - Euro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d0d0d; color: #f4f4f5; font-family: sans-serif; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .neon-text { text-shadow: 0 0 8px rgba(220, 38, 38, 0.6); }
    </style>
</head>
<body class="h-screen flex flex-col items-center justify-start bg-zinc-950 overflow-hidden">

    <div class="w-full max-w-md bg-zinc-900 h-full relative flex flex-col shadow-2xl border-x border-zinc-800 overflow-hidden">
        
        <!-- HEADER -->
        <header class="bg-zinc-800 p-4 shadow-lg z-20 border-b border-zinc-700">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-wider text-red-600 neon-text" style="font-family: Impact, sans-serif;">Rockabilly Radar</h1>
                    <div class="flex items-center gap-1.5 pt-0.5">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-ping"></span>
                        <p class="text-[9px] text-zinc-400 font-bold uppercase tracking-widest">Europa Live-Modus</p>
                    </div>
                </div>
                <div class="text-right">
                    <span id="currentLocationName" class="text-[11px] bg-red-950 text-red-400 font-bold px-2 py-1 rounded-md border border-red-800">Ortung...</span>
                    <p id="lastUpdateLabel" class="text-[8px] text-zinc-500 mt-1">Lade Euro-Daten...</p>
                </div>
            </div>
        </header>

        <!-- STEUERUNGSPANEL -->
        <div class="bg-zinc-800/40 p-4 border-b border-zinc-800 space-y-3 z-10 shadow-inner">
            
            <!-- Suche -->
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider block">Euro-Suche (Festival, Band, Land, Stadt):</label>
                <div class="relative flex items-center">
                    <i class="fa-solid fa-earth-europe text-zinc-500 absolute left-3 text-xs"></i>
                    <input type="text" id="keywordSearch" placeholder="z.B. Rhythm Riot, Italy, Jamboree..." 
                        class="w-full bg-zinc-950/90 border border-zinc-700 rounded-lg py-1.5 pl-8 pr-3 text-xs text-white focus:outline-none focus:border-red-500 font-medium"
                        oninput="renderEvents()">
                </div>
            </div>

            <!-- Standort-Abgleich -->
            <div class="space-y-1">
                <label class="text-[10px] text-zinc-400 font-bold uppercase tracking-wider block">Standort-Synchronisation:</label>
                <div class="flex gap-2">
                    <select id="userLocationSelect" class="flex-1 bg-zinc-950/90 border border-zinc-700 rounded-lg py-1.5 px-3 text-xs text-white focus:outline-none focus:border-red-500 font-semibold cursor-pointer" onchange="onLocationSelectChange(this.value)">
                        <option value="gößnitz">Heimat-Basis (Mitteldeutschland)</option>
                        <option value="london">London (UK)</option>
                        <option value="rimini">Senigallia / Rimini (Italien)</option>
                        <option value="malaga">Málaga (Spanien)</option>
                    </select>
                    
                    <button onclick="forceLiveRefresh()" class="bg-red-700 hover:bg-red-600 border border-red-600 text-white p-2 rounded-lg text-xs flex items-center justify-center transition-all px-3 font-bold gap-1">
                        <i class="fa-solid fa-location-crosshairs"></i> GPS Sync
                    </button>
                </div>
            </div>

            <!-- MASSIVER EURO-RADIUS SCHIEBEREGLER -->
            <div class="space-y-1 pt-1">
                <div class="flex justify-between items-center text-xs">
                    <span class="font-bold text-zinc-400 uppercase tracking-wider">Europa-Radius (Roadtrip-Distanz)</span>
                    <span id="distanceVal" class="text-red-500 font-black text-sm">1500 km</span>
                </div>
                <input type="range" id="distanceSlider" min="10" max="2500" value="1500" step="50" class="w-full accent-red-600 h-2 bg-zinc-700 rounded-lg appearance-none cursor-pointer" oninput="updateFilter(this.value)">
            </div>
        </div>

        <!-- EVENTS-LISTE -->
        <main id="eventList" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar pb-24"></main>

        <!-- STICKY FOOTER -->
        <footer class="absolute bottom-0 left-0 right-0 bg-zinc-900 border-t border-zinc-800 p-3 flex items-center justify-between z-30 shadow-2xl">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-9 h-9 bg-red-600 rounded-lg flex items-center justify-center shadow-lg shadow-red-900/40 shrink-0">
                    <i class="fa-solid fa-radio text-white text-sm"></i>
                </div>
                <div class="min-w-0">
                    <p class="text-xs font-black text-white uppercase tracking-wide truncate">Rockabilly Radio</p>
                    <p class="text-[10px] text-zinc-400 font-medium truncate">Pure Rock'n'Roll Live Stream</p>
                </div>
            </div>
            <audio id="radioStream" src="http://stream.rockabillyradio.net:8000/stream" preload="none"></audio>
            <button id="playBtn" onclick="toggleRadio()" class="bg-red-600 hover:bg-red-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-md transition-all">
                <i id="playIcon" class="fa-solid fa-play ml-0.5 text-sm"></i>
            </button>
        </footer>

    </div>

    <script>
        const cityCoordinates = {
            "gößnitz": { lat: 50.8941, lon: 12.4292, name: "Zentral-Basis" },
            "london": { lat: 51.5074, lon: -0.1278, name: "London (UK)" },
            "rimini": { lat: 43.7147, lon: 13.2183, name: "Senigallia (IT)" },
            "malaga": { lat: 36.7213, lon: -4.4214, name: "Málaga (ES)" }
        };

        let currentCenter = cityCoordinates["gößnitz"];
        let currentMaxDistance = 1500;
        let eventsData = [];

        // Durch das Hosten auf GitHub Pages liegt die json-Datei im selben Ordner!
        const EVENT_SOURCE_URL = 'events.json'; 

        async function loadEventsData() {
            try {
                const response = await fetch(`${EVENT_SOURCE_URL}?t=${new Date().getTime()}`);
                eventsData = await response.json();
                const jetzt = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('lastUpdateLabel').innerText = `Euro-Update: ${jetzt} Uhr`;
                renderEvents();
            } catch (error) {
                console.error("Fehler beim Abruf der Euro-Daten:", error);
                document.getElementById('eventList').innerHTML = `<div class="text-center p-4 text-red-500 text-xs">Verbindungsfehler zum Euro-Server.</div>`;
            }
        }

        function forceLiveRefresh() {
            document.getElementById('lastUpdateLabel').innerText = "Ortung läuft...";
            trackGPSAndRefresh();
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
        }

        function onLocationSelectChange(value) {
            if (cityCoordinates[value]) {
                currentCenter = cityCoordinates[value];
                document.getElementById('currentLocationName').innerText = cityCoordinates[value].name;
                renderEvents();
            }
        }

        function trackGPSAndRefresh() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    currentCenter = { lat: position.coords.latitude, lon: position.coords.longitude };
                    document.getElementById('currentLocationName').innerText = "📍 GPS Aktiv";
                    loadEventsData();
                }, () => {
                    document.getElementById('currentLocationName').innerText = "Zentral-Basis";
                    loadEventsData();
                });
            } else {
                loadEventsData();
            }
        }

        function updateFilter(val) {
            currentMaxDistance = parseInt(val);
            document.getElementById('distanceVal').innerText = val + " km";
            renderEvents();
        }

        function toggleRadio() {
            const audio = document.getElementById('radioStream');
            const icon = document.getElementById('playIcon');
            if (audio.paused) {
                audio.play().catch(() => {});
                icon.className = "fa-solid fa-pause";
            } else {
                audio.pause();
                icon.className = "fa-solid fa-play ml-0.5";
            }
        }

        function renderEvents() {
            const listEl = document.getElementById('eventList');
            const keyword = document.getElementById('keywordSearch').value.toLowerCase().trim();
            listEl.innerHTML = '';
            
            if(eventsData.length === 0) return;

            const mapped = eventsData.map(e => ({ ...e, calculatedDistance: calculateDistance(currentCenter.lat, currentCenter.lon, e.lat, e.lon) }));
            
            const filtered = mapped.filter(e => {
                const matchesDistance = e.calculatedDistance <= currentMaxDistance;
                const matchesKeyword = e.title.toLowerCase().includes(keyword) || 
                                       e.desc.toLowerCase().includes(keyword) || 
                                       e.city.toLowerCase().includes(keyword) ||
                                       e.location.toLowerCase().includes(keyword);
                return matchesDistance && matchesKeyword && e.status !== "cancelled";
            });

            filtered.sort((a, b) => a.calculatedDistance - b.calculatedDistance);

            if(filtered.length === 0) {
                listEl.innerHTML = `<div class="text-center p-8 text-zinc-500 text-xs"><i class="fa-solid fa-globe block text-lg mb-2 text-zinc-700"></i>Keine europäischen Events im gewählten Radius gefunden.</div>`;
                return;
            }

            filtered.forEach(e => {
                const bookingUrl = `https://www.booking.com/searchresults.html?ss=${encodeURIComponent(e.city)}`;
                const gCalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(e.title)}&dates=${e.gCalDates}&details=${encodeURIComponent(e.desc)}&location=${encodeURIComponent(e.location)}`;
                let typeIcon = e.type === "festival" ? "fa-guitar text-red-500" : "fa-beer-mug-empty text-amber-500";

                listEl.innerHTML += `
                    <div class="bg-zinc-800 p-4 rounded-xl flex justify-between items-start border border-zinc-700/80 shadow-md">
                        <div class="space-y-1 pr-2 flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="bg-red-900/40 text-red-400 text-[10px] font-black px-2 py-0.5 rounded-md border border-red-700/50">${e.calculatedDistance} km</span>
                                <span class="text-xs text-zinc-400 font-medium">${e.date}</span>
                            </div>
                            <h3 class="font-bold text-sm text-white truncate flex items-center gap-1.5"><i class="fa-solid ${typeIcon} text-xs"></i>${e.title}</h3>
                            <p class="text-xs text-zinc-500 truncate"><i class="fa-solid fa-location-dot mr-1 text-zinc-600"></i>${e.location} (${e.city})</p>
                            <p class="text-[11px] text-zinc-400 pt-1 line-clamp-2">${e.desc}</p>
                        </div>
                        <div class="flex flex-col gap-1.5 shrink-0 ml-2 self-start pt-1">
                            <button onclick="window.open('${e.url}', '_blank')" class="bg-red-700 hover:bg-red-600 text-white px-2 py-1 rounded-lg font-bold text-[10px] uppercase text-center w-20">Website</button>
                            <button onclick="window.open('${gCalUrl}', '_blank')" class="bg-emerald-700 hover:bg-emerald-600 text-white px-2 py-1 rounded-lg font-bold text-[10px] uppercase text-center w-20 flex items-center justify-center gap-1"><i class="fa-solid fa-calendar-plus text-[9px]"></i> +Cal</button>
                            <button onclick="window.open('${bookingUrl}', '_blank')" class="bg-blue-700 hover:bg-blue-600 text-white px-2 py-1 rounded-lg font-bold text-[10px] uppercase text-center w-20 flex items-center justify-center gap-1"><i class="fa-solid fa-bed text-[9px]"></i> Reisedaten</button>
                        </div>
                    </div>`;
            });
        }

        window.addEventListener('load', () => {
            trackGPSAndRefresh();
        });
    </script>
</body>
</html>
