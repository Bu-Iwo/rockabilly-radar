<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rockabilly Radar ⚡</title>
    
    <meta name="theme-color" content="#ff4500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RockRadar">
    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent: #ff4500;
            --text: #e0e0e0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 0;
            padding-bottom: 60px;
        }
        header {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        h1 { margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 10px;
            border: 2px solid var(--accent);
            z-index: 1;
        }

        .controls {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .control-row {
            margin-bottom: 15px;
        }
        .control-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 70%;
            padding: 10px;
            background: #333;
            border: 1px solid var(--accent);
            color: white;
            border-radius: 4px;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        button {
            padding: 10px 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background: #ff5722;
        }

        /* SUCHLEISTE */
        .search-box {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 2px solid var(--accent);
            color: white;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .search-box:focus {
            outline: none;
            border-color: #ff5722;
            background: #3a3a3a;
        }
        .search-box::placeholder {
            color: #888;
        }

        .event-list {
            max-height: 800px;
            overflow-y: auto;
        }
        .event-card {
            background: var(--card-bg);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: transform 0.2s;
        }
        .event-card:hover { transform: translateX(5px); }
        .event-title { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
        .event-date { color: #aaa; font-size: 0.9rem; margin-bottom: 5px; }
        .event-loc { font-size: 0.9rem; color: #ccc; }
        .distance-badge {
            float: right;
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .event-details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333;
        }
        .event-details.active {
            display: block;
        }
        .event-desc {
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.85rem;
            border: 1px solid #555;
            transition: all 0.2s;
        }
        .btn-action:hover {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-calendar {
            background: #4285f4;
            border-color: #4285f4;
        }
        .btn-calendar:hover {
            background: #3367d6;
        }
        .btn-booking {
            background: #003580;
            border-color: #003580;
        }
        .btn-booking:hover {
            background: #00275e;
        }
        
        .btn-toggle {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 5px 10px;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .btn-toggle:hover {
            background: var(--accent);
            color: white;
        }

        .radio-player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #000;
            border-top: 2px solid var(--accent);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
        }

        .install-banner {
            display: none;
            background: var(--accent);
            color: white;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

        .status-msg {
            background: #333;
            padding: 10px;
            border-radius: 4px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .radius-display {
            display: inline-block;
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
        }

        .sort-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .sort-btn {
            flex: 1;
            padding: 8px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .sort-btn.active {
            background: var(--accent);
            border-color: var(--accent);
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 1.1rem;
        }

        .search-highlight {
            background: rgba(255, 69, 0, 0.3);
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="install-banner" id="installBanner">
    📱 App installieren? Hier tippen!
</div>

<header>
    <h1>🎸 Rockabilly Radar ⚡</h1>
    <p style="margin:5px 0 0 0; font-size:0.9rem; color:#aaa;">Finde die heißesten Gigs in Europa</p>
</header>

<div class="container">
    <div>
        <div id="map"></div>
        <div class="controls">
            <div class="control-row">
                <label>📍 Dein Standort:</label>
                <input type="text" id="city-input" placeholder="Stadt eingeben oder GPS nutzen">
                <button onclick="updateLocation()">Suchen</button>
                <button onclick="getGPSLocation()">📡 GPS</button>
            </div>
            
            <div class="control-row">
                <label>📏 Entfernung: <span class="radius-display" id="radius-display">2500 km</span></label>
                <input type="range" id="radius-slider" min="10" max="2500" value="2500" step="10" oninput="updateRadius()">
            </div>

            <div class="control-row">
                <label>📊 Sortierung:</label>
                <div class="sort-controls">
                    <button class="sort-btn active" id="sort-date" onclick="setSortMode('date')">📅 Datum</button>
                    <button class="sort-btn" id="sort-distance" onclick="setSortMode('distance')">📍 Entfernung</button>
                </div>
            </div>

            <div id="status-msg" class="status-msg">
                Lade Daten...
            </div>
        </div>
    </div>

    <div>
        <!-- SUCHLEISTE -->
        <input type="text" 
               class="search-box" 
               id="search-input" 
               placeholder="🔍 Suche nach Band, Ort oder Event..."
               oninput="updateDisplay()">
        
        <div class="event-list" id="events-container">
            <p>Lade Termine...</p>
        </div>
    </div>
</div>

<div class="radio-player">
    <div>
        <strong>📻 Radio Preston Air</strong>
        <span id="radio-status" style="font-size:0.8rem; color:#aaa; margin-left:10px;">Bereit</span>
    </div>
    <button onclick="toggleRadio()" id="play-btn">PLAY</button>
</div>
<audio id="audio-stream" src="https://stream.radio-preston-air.com/live"></audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let allEvents = [];
    let userLat = 50.7189;
    let userLon = 12.4961;
    let maxRadius = 2500;
    let sortMode = 'date';
    let map, markersLayer, userMarker;

    let deferredPrompt;
    const installBanner = document.getElementById('installBanner');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBanner.style.display = 'block';
    });

    installBanner.addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
                installBanner.style.display = 'none';
            });
        }
    });

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker registriert'))
            .catch(err => console.log('Service Worker Fehler', err));
    }

    function initMap() {
        map = L.map('map').setView([userLat, userLon], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        
        userMarker = L.marker([userLat, userLon], {
            icon: L.divIcon({
                className: 'user-marker',
                html: '<div style="background: #00ff00; width: 20px; height
